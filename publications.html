  <script>
    /**
     * BibTeX Parser & Publication Renderer
     */
    (function () {
      'use strict';

      /* ---------- BibTeX Parser (no dotAll flag for max compatibility) ---------- */
      function parseBibtex(text) {
        const entries = [];
        let i = 0;
        while (i < text.length) {
          const atIdx = text.indexOf('@', i);
          if (atIdx === -1) break;
          const braceOpen = text.indexOf('{', atIdx);
          const comma = text.indexOf(',', braceOpen);
          if (braceOpen === -1 || comma === -1) break;

          const entryType = text.slice(atIdx + 1, braceOpen).trim().toLowerCase();
          const citekey = text.slice(braceOpen + 1, comma).trim();

          // Find matching closing brace
          let braceCount = 1;
          let j = comma + 1;
          while (j < text.length && braceCount > 0) {
            if (text[j] === '{') braceCount++;
            else if (text[j] === '}') braceCount--;
            j++;
          }
          if (braceCount !== 0) break;

          const body = text.slice(comma + 1, j - 1);
          i = j;

          // Parse fields: key = {value} or key = "value"
          const fields = {};
          const fieldRegex = /(\w+)\s*=\s*(\{[^{}]*\}|"[^"]*")/g;
          let fm;
          while ((fm = fieldRegex.exec(body)) !== null) {
            const key = fm[1].toLowerCase().trim();
            let val = fm[2].trim();
            if ((val.startsWith('{') && val.endsWith('}')) || (val.startsWith('"') && val.endsWith('"'))) {
              val = val.slice(1, -1);
            }
            fields[key] = val;
          }

          entries.push({ type: entryType, key: citekey, fields });
        }
        return entries;
      }

      /* ---------- Author Formatter ---------- */
      function formatAuthors(authorStr, isCorresponding) {
        if (!authorStr) return '';
        const authors = authorStr.split(/\s+and\s+/i).map(s => s.trim()).filter(Boolean);
        const formatted = authors.map((author, idx) => {
          // Detect if this author is Yang Liu
          const nameLower = author.toLowerCase();
          const isYangLiu = nameLower === 'liu, yang' || nameLower === 'yang liu' || nameLower.includes('liu, yang');

          let display;
          if (nameLower === 'others') {
            display = 'et al.';
          } else if (author.includes(',')) {
            // "Liu, Yang" -> "Y. Liu"
            const [last, first] = author.split(',').map(s => s.trim());
            const firstInitial = first ? first.charAt(0) + '.' : '';
            display = firstInitial + ' ' + last;
          } else {
            // "Yang Liu" -> "Y. Liu"
            const parts = author.split(/\s+/);
            const last = parts.pop();
            const initials = parts.map(p => p.charAt(0) + '.').join(' ');
            display = (initials ? initials + ' ' : '') + last;
          }

          // Mark corresponding author with asterisk
          const suffix = (isYangLiu && isCorresponding) ? '*' : '';

          if (isYangLiu) {
            return '<strong class="author-bold">' + display + suffix + '</strong>';
          }
          return display + suffix;
        });

        if (formatted.length <= 6) {
          return formatted.join(', ');
        }
        // More than 6 authors: show first 3 + et al.
        return formatted.slice(0, 3).join(', ') + ', et al.';
      }

      /* ---------- GB/T 7714-2015 Formatter ---------- */
      function formatGBT7714(entry, meta) {
        const f = entry.fields;
        const authors = formatAuthors(f.author || '', meta.corresponding);
        const title = f.title || '';
        const year = f.year || '';
        let text = '';

        if (entry.type === 'inproceedings') {
          const booktitle = f.booktitle || '';
          const pages = f.pages ? ': ' + f.pages.replace(/--/g, '-') : '';
          text = authors + '. ' + title + '[C]. ' + booktitle + ', ' + year + pages + '.';
        } else {
          // article / survey
          const journal = (f.journal || '').replace(/\\&/g, '&');
          const volume = f.volume || '';
          const pages = f.pages ? ': ' + f.pages.replace(/--/g, '-') : '';
          let volPart = '';
          if (volume) {
            volPart = ', ' + volume;
          }
          text = authors + '. ' + title + '[J]. ' + journal + ', ' + year + volPart + pages + '.';
        }
        return text;
      }

      /* ---------- Render Publications ---------- */
      function renderPubs(filter) {
        const fallbackSource = document.getElementById('bibtexSource').textContent;
        const source = window.bibtexLoaded || fallbackSource;
        const entries = parseBibtex(source);

        // Attach metadata and sort by year desc
        entries.forEach(e => {
          e.meta = PUB_META[e.key] || { type: 'journal', tags: [], corresponding: false };
        });
        entries.sort((a, b) => (parseInt(b.fields.year) || 0) - (parseInt(a.fields.year) || 0));

        const container = document.getElementById('pubList');
        container.innerHTML = '';

        // Group by year
        const yearGroups = {};
        entries.forEach(e => {
          const y = e.fields.year || 'N/A';
          if (!yearGroups[y]) yearGroups[y] = [];
          yearGroups[y].push(e);
        });

        const years = Object.keys(yearGroups).sort((a, b) => parseInt(b) - parseInt(a));

        years.forEach(year => {
          const groupEntries = yearGroups[year].filter(e => {
            if (filter === 'all') return true;
            return e.meta.type === filter;
          });
          if (groupEntries.length === 0) return;

          const yearDiv = document.createElement('div');
          yearDiv.className = 'pub-year-group';

          const yearTitle = document.createElement('h3');
          yearTitle.className = 'pub-year-title';
          yearTitle.textContent = year;
          yearDiv.appendChild(yearTitle);

          groupEntries.forEach(e => {
            const item = document.createElement('div');
            item.className = 'pub-item';
            item.dataset.type = e.meta.type;

            const textDiv = document.createElement('div');
            textDiv.className = 'pub-text';
            textDiv.innerHTML = formatGBT7714(e, e.meta);
            item.appendChild(textDiv);

            if (e.meta.tags && e.meta.tags.length > 0) {
              const tagsDiv = document.createElement('div');
              tagsDiv.className = 'pub-tags';
              e.meta.tags.forEach(t => {
                const span = document.createElement('span');
                span.className = 'pub-tag ' + t.cls;
                span.textContent = t.text;
                tagsDiv.appendChild(span);
              });
              item.appendChild(tagsDiv);
            }

            yearDiv.appendChild(item);
          });

          container.appendChild(yearDiv);
        });
      }

      /* ---------- Filter Buttons ---------- */
      function initFilters() {
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPubs(btn.dataset.filter);
          });
        });
      }

      /* ---------- Init ---------- */
      document.addEventListener('DOMContentLoaded', () => {
        renderPubs('all');
        initFilters();
      });
    })();
  </script>
